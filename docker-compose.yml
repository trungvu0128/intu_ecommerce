version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lotus-db
    restart: always
    environment:
      POSTGRES_USER: lotus-admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lotus_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/init_db.sql:/docker-entrypoint-initdb.d/init.sql

#  redis:
#    image: redis:7-alpine
#    container_name: lotus-redis
#    restart: always
#    ports:
#      - "6379:6379"

#  meili:
#    image: getmeili/meilisearch:v1.7
#    container_name: lotus-meili
#    restart: always
#    environment:
#      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
#      - MEILI_ENV=development
#    ports:
#      - "7700:7700"
#    volumes:
#      - meili_data:/meili_data

  pgadmin:
    image: dpage/pgadmin4
    container_name: lotus-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lotus.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build:
      context: ./server
      dockerfile: src/API/Dockerfile
    container_name: lotus-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Database
      - ConnectionStrings__DefaultConnection=Host=db;Database=lotus_ecommerce;Username=postgres;Password=${DB_PASSWORD}
      # JWT
      - JwtSettings__Secret=${JWT_SECRET}
      # Telegram notifications
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID}
      # Google OAuth
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      # Firebase Admin SDK
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID}
      # Cloudflare R2 / S3
      - S3__AccessKey=${S3_ACCESS_KEY}
      - S3__SecretKey=${S3_SECRET_KEY}
      - S3__Endpoint=${S3_ENDPOINT}
      - S3__BucketName=${S3_BUCKET_NAME}
      - S3__PublicUrl=${S3_PUBLIC_URL}
      # SePay payment
      - SePay__SecretKey=${SEPAY_SECRET_KEY}
      - SePay__WebhookSecretKey=${SEPAY_WEBHOOK_SECRET_KEY}
      - SePay__MerchantId=${SEPAY_MERCHANT_ID}
      - SePay__Environment=${SEPAY_ENVIRONMENT}
#      - Redis__ConnectionString=redis:6379
#      - Meilisearch__Url=http://meili:7700
#      - Meilisearch__ApiKey=${MEILI_MASTER_KEY}
    ports:
      - "5000:8080"
    depends_on:
      - db

  client:
    build:
      context: ./client-next
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: lotus-client
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile.dev
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: lotus-cms
    user: root
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./cms:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api

volumes:
  postgres_data:
#  meili_data:
