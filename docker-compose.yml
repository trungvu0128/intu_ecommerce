version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lotus-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: lotus_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/init.sql

#  redis:
#    image: redis:7-alpine
#    container_name: lotus-redis
#    restart: always
#    ports:
#      - "6379:6379"

#  meili:
#    image: getmeili/meilisearch:v1.7
#    container_name: lotus-meili
#    restart: always
#    environment:
#      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
#      - MEILI_ENV=development
#    ports:
#      - "7700:7700"
#    volumes:
#      - meili_data:/meili_data

  pgadmin:
    image: dpage/pgadmin4
    container_name: lotus-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lotus.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build:
      context: ./server
      dockerfile: src/API/Dockerfile
    container_name: lotus-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=lotus_ecommerce;Username=postgres;Password=${DB_PASSWORD}
#      - Redis__ConnectionString=redis:6379
#      - Meilisearch__Url=http://meili:7700
#      - Meilisearch__ApiKey=${MEILI_MASTER_KEY}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID}
      - JwtSettings__Secret=${JWT_SECRET}
    ports:
      - "5000:8080"
    depends_on:
      - db
#      - redis
#      - meili

  client:
    build:
      context: ./client-next
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: lotus-client
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./client-next:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: lotus-cms
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./cms:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api

volumes:
  postgres_data:
#  meili_data:
