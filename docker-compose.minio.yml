version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DEFAULT_BUCKETS: intuoo,products,images,uploads
      MINIO_SERVER_URL: https://bucket-storage.intuoo.com
      MINIO_BROWSER_REDIRECT_URL: https://bucket-storage.intuoo.com
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - minio_network
    restart: unless-stopped

volumes:
  minio_data:
    driver: local

networks:
  minio_network:
    driver: bridge