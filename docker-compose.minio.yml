version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: https://bucket-storage.intuoo.com
      MINIO_BROWSER_REDIRECT_URL: https://bucket-storage.intuoo.com
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - minio_network
    restart: unless-stopped

  minio-nginx:
    image: nginx:alpine
    container_name: minio_nginx
    ports:
      - "9000:80"
    volumes:
      - ./nginx-minio.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - minio_network
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Wait for minio to be fully reachable...';
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      echo 'Creating default buckets...';
      /usr/bin/mc mb myminio/intuoo --ignore-existing;
      /usr/bin/mc mb myminio/products --ignore-existing;
      /usr/bin/mc mb myminio/images --ignore-existing;
      /usr/bin/mc mb myminio/uploads --ignore-existing;
      echo 'Setting buckets to public download...';
      /usr/bin/mc anonymous set download myminio/intuoo;
      /usr/bin/mc anonymous set download myminio/products;
      /usr/bin/mc anonymous set download myminio/images;
      /usr/bin/mc anonymous set download myminio/uploads;
      echo 'MinIO buckets setup complete!';
      exit 0;
      "
    networks:
      - minio_network

volumes:
  minio_data:
    driver: local

networks:
  minio_network:
    driver: bridge