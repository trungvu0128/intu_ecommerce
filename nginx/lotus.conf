upstream client {
    server localhost:3000;
}

upstream api {
    server localhost:5000;
}

upstream cms {
    server localhost:5173;
}

# =========================================
# intuoo.com / www.intuoo.com → Next.js Client
# =========================================
server {
    listen 80;
    server_name intuoo.com www.intuoo.com;

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# =========================================
# api.intuoo.com → .NET API
# =========================================
server {
    listen 80;
    server_name api.intuoo.com;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow larger payload for file uploads
        client_max_body_size 50M;
    }
}

# =========================================
# cms.intuoo.com → Vite CMS Admin
# =========================================
server {
    listen 80;
    server_name cms.intuoo.com;

    location / {
        proxy_pass http://cms;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
