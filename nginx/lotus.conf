upstream client {
    server localhost:3000;
}

upstream api {
    server localhost:5000;
}

upstream cms {
    server localhost:5173;
}

upstream bucket-storage {
    server localhost:9000;
}

upstream bucket-storage-console {
    server localhost:9001;
}


# =========================================
# intuoo.com → Next.js Client
# =========================================
server {
    server_name intuoo.com;

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/intuoo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/intuoo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# =========================================
# api.intuoo.com → .NET API
# =========================================
server {
    server_name api.intuoo.com;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow larger request bodies for file uploads (e.g. product images)
        client_max_body_size 50M;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/intuoo.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/intuoo.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

